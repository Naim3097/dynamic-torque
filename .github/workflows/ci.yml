name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────
  # React web app — lint, type-check, build
  # ─────────────────────────────────────────────────────────
  web:
    name: dynamic-torque-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dynamic-torque-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dynamic-torque-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check + build
        env:
          # CI needs non-empty values so the Supabase client init passes.
          # These are placeholders; the real keys live in Vercel project env.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_ci_placeholder
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_MESSAGING_SENDER_ID: '0'
          VITE_FIREBASE_APP_ID: ci-placeholder
          VITE_FIREBASE_VAPID_KEY: ci-placeholder
          VITE_APP_URL: http://localhost:5173
        run: npm run build

  # ─────────────────────────────────────────────────────────
  # Flutter admin app — format check, analyze, test
  # ─────────────────────────────────────────────────────────
  admin:
    name: dynamic-torque-admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dynamic-torque-admin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create .env placeholder
        run: |
          cat > .env <<EOF
          SUPABASE_URL=https://example.supabase.co
          SUPABASE_ANON_KEY=sb_publishable_ci_placeholder
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  # ─────────────────────────────────────────────────────────
  # Supabase — validate migrations + edge functions
  # ─────────────────────────────────────────────────────────
  supabase:
    name: supabase
    runs-on: ubuntu-latest
    if: hashFiles('supabase/**') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Lint edge functions
        run: |
          if [ -d "supabase/functions" ]; then
            for fn in supabase/functions/*/; do
              echo "Checking $fn"
              deno check "$fn/index.ts" || true
            done
          fi
